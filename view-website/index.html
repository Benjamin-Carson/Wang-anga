<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang'anga Senior School - View Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 50%, #1a5276 100%);
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1a5276, #2980b9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo i { font-size: 40px; color: #d4ac0d; }
        h1 { color: #1a5276; font-size: 22px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s;
        }
        .link-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .link-btn i { font-size: 20px; width: 30px; text-align: center; }
        .btn-home { background: linear-gradient(135deg, #1a5276, #2980b9); }
        .btn-admin { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        .btn-teacher { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-student { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .btn-parent { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-login { background: linear-gradient(135deg, #34495e, #2c3e50); }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
        .footer-text a { color: #1a5276; text-decoration: none; }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>Wang'anga Senior School</h1>
        <p class="subtitle">Excellence in Education</p>

        <div class="links">
            <a href="../index.html" class="link-btn btn-home">
                <i class="fas fa-globe"></i> Visit School Website
            </a>

            <div class="divider">Portal Logins</div>

            <a href="../login.html" class="link-btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Login Portal (All Roles)
            </a>
            <a href="../admin.html" class="link-btn btn-admin">
                <i class="fas fa-user-shield"></i> Admin Dashboard
            </a>
            <a href="../teacher.html" class="link-btn btn-teacher">
                <i class="fas fa-chalkboard-teacher"></i> Teacher Dashboard
            </a>
            <a href="../student.html" class="link-btn btn-student">
                <i class="fas fa-user-graduate"></i> Student Dashboard
            </a>
            <a href="../parent.html" class="link-btn btn-parent">
                <i class="fas fa-users"></i> Parent Dashboard
            </a>
        </div>

        <p class="footer-text">
            Phone: 0798394035<br>
            <a href="mailto:bencarsonodhiambo6@gmail.com">bencarsonodhiambo6@gmail.com</a>
        </p>
    </div>
</body>
</html>
